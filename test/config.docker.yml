general:
  provider: containerlab
server:
  host: 0.0.0.0
  port: 3000
auth:
  enableNative: true
  enableOpenId: false
  openIdIssuer: ""
  openIdClientId: ""
  openIdRedirectHost: ""
  openIdAdminGroups: []
shell:
  userLimit: 20
  timeout: 1800
database:
  host: 127.0.0.1
  port: 5432
  database: antimony
  user: antimony
  localFile: ./db/antimony.db
capture:
  enabled: yes
  cmd: ssh -o StrictHostKeyChecking=no capture@localhost {{.ContainerName}} {{.InterfaceName}} | wireshark -k -i -
  excluded: ["lo", "gway-2800", "monit_in", "mgmt0-0"]
filesystem:
  storage: ./storage/
  run: ./run/
containerlab:
  schemaUrl: https://raw.githubusercontent.com/srl-labs/containerlab/refs/heads/main/schemas/clab.schema.json
  schemaFallback: ./data/clab.schema.json
  deviceConfig: ./data/device-config.json